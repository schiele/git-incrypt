name: Test
on: [push]
jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm, macos-13, macos-14, macos-15]
    steps:
      - name: Install system packages (Ubuntu)
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y asciidoc python3-pygit2 python3-pip
      - name: Install system packages (MacOS)
        if: startsWith(matrix.os, 'macos')
        run : |
          brew update
          brew install asciidoc libgit2
          pip3 install --upgrade pip
          pip3 install pygit2
      - name: Install Python packages
        run: |
          pip3 install --upgrade pip
          pip3 install pylint pycodestyle
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Test
        run: |
          git config --global user.email "testuser@example.com"
          git config --global user.name "Test User"
          gpg --batch --gen-key .github/workflows/testkey.conf
          make KEY:=$(gpg --list-keys --with-colons | awk -F: '/^pub/ {print $5; exit}') test
