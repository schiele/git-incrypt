name: Test
on: [push]
jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm, macos-13, macos-14, macos-15, windows-latest]
    steps:
      - name: Install system dependencies (Ubuntu)
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y asciidoc python3-pygit2 python3-pip
      - name: Install system dependencies (MacOS)
        if: startsWith(matrix.os, 'macos')
        run : |
          brew update
          brew install asciidoc xmlto libgit2
          HOMEBREW_PREFIX=$(brew --prefix)
          echo "XML_CATALOG_FILES=${HOMEBREW_PREFIX}/etc/xml/catalog" >> $GITHUB_ENV
      - name: Install Python packages
        if: runner.os != 'Windows'
        run: |
          python3 -m venv $GITHUB_WORKSPACE/venv
          source $GITHUB_WORKSPACE/venv/bin/activate
          python3 -m pip install --upgrade pip
          python3 -m pip install pylint pycodestyle pygit2 cryptography asciidoc
      - name: Install Python packages
        if: runner.os == 'Windows'
        run: |
          python3 -m $env:GITHUB_WORKSPACE\venv venv
          dir $env:GITHUB_WORKSPACE\venv
          dir $env:GITHUB_WORKSPACE\venv\Scripts
          "$env:GITHUB_WORKSPACE\venv\Scripts\activate"
          python3 -m pip install --upgrade pip
          python3 -m pip install pylint pycodestyle pygit2 cryptography asciidoc
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Test
        if: runner.os != 'Windows'
        run: |
          git config --global user.email "testuser@example.com"
          git config --global user.name "Test User"
          gpg --batch --gen-key .github/workflows/testkey.conf
          source $GITHUB_WORKSPACE/venv/bin/activate
          make KEY:=$(gpg --list-keys --with-colons | awk -F: '/^pub/ {print $5; exit}') test
      - name: Test
        if: runner.os == 'Windows'
        run: |
          git config --global user.email "testuser@example.com"
          git config --global user.name "Test User"
          gpg --batch --gen-key .github/workflows/testkey.conf
          dir $env:GITHUB_WORKSPACE/venv
          dir $env:GITHUB_WORKSPACE/venv/Scripts
          "$env:GITHUB_WORKSPACE/venv/Scripts/activate"
          make KEY:=$(gpg --list-keys --with-colons | awk -F: '/^pub/ {print $5; exit}') test
